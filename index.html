<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crave Me by Ashakky | Premium Lingerie & Intimates</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #9A7A2F;
    --black: #0A0A0A; --charcoal: #1A1A1A; --dark: #111111;
    --cream: #F8F3EC;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--cream); overflow-x: hidden; }

  /* NAVIGATION */
  nav { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 18px 5%; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,10,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,168,76,0.2); transition: padding 0.3s; }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo-circle { width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.4); overflow: hidden; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .nav-logo-circle img { width:100%; height:100%; object-fit:cover; }
  .nav-brand { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); }
  .nav-brand span { display: block; font-size: 0.58rem; color: #888; letter-spacing: 0.2em; font-family: 'Montserrat', sans-serif; font-weight: 300; text-transform: uppercase; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { color: #ccc; text-decoration: none; font-size: 0.73rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; transition: color 0.3s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-whatsapp { background: var(--gold); color: var(--black); padding: 10px 20px; border-radius: 2px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: all 0.3s; white-space:nowrap; }

  /* HERO SECTION */
  .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: var(--black); padding-top: 80px; }
  .hero-content { text-align: center; position: relative; z-index: 2; max-width: 820px; padding: 0 5%; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 7vw, 5.5rem); line-height: 1.06; font-weight: 700; margin-bottom: 10px; color: #fff; }
  .hero-title em { color: var(--gold); font-style: italic; }

  /* PRODUCTS GRID */
  #products { background: var(--black); padding: 80px 5%; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 44px; }
  .filter-btn { padding: 8px 22px; border-radius: 2px; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; border: 1px solid rgba(201,168,76,0.3); background: transparent; color: #aaa; transition: all 0.3s; }
  .filter-btn.active { background: var(--gold); color: var(--black); }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 22px; }
  .product-card { background: var(--charcoal); border-radius: 4px; overflow: hidden; transition: all 0.35s; border: 1px solid rgba(255,255,255,0.05); }
  .product-image-wrap { aspect-ratio: 3/4; overflow: hidden; background: var(--dark); }
  .product-img { width:100%; height:100%; object-fit:cover; }
  .product-info { padding: 16px; }
  .product-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #fff; margin-bottom: 8px; }
  .product-price { color: var(--gold); font-weight: 700; font-size: 1.2rem; }
  .btn-order { width: 100%; padding: 12px; background: var(--gold); border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 15px; }

  /* MODAL */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
  .modal-content { background: var(--charcoal); width: 100%; max-width: 500px; padding: 30px; border: 1px solid var(--gold); position: relative; }
  .close-modal { position: absolute; top: 15px; right: 15px; color: var(--gold); cursor: pointer; font-size: 1.5rem; }
  .modal-input { width: 100%; padding: 12px; background: var(--black); border: 1px solid #333; color: #fff; margin-bottom: 15px; }

  @media (max-width: 768px) { .nav-links { display: none; } }
</style>
</head>
<body>

<nav id="navbar">
  <a href="#" class="nav-logo">
    <div class="nav-logo-circle"><img id="brandLogo" src="https://via.placeholder.com/100" alt="Logo"></div>
    <div class="nav-brand"><span id="brandNameTop">CRAVE ME BY ASHAKKY</span>PREMIUM INTIMATES</div>
  </a>
  <ul class="nav-links">
    <li><a href="#products">Shop All</a></li>
    <li><a href="#categories">Categories</a></li>
  </ul>
  <a href="#" class="nav-whatsapp" id="navWA">WhatsApp</a>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">Elevate Your <em>Confidence</em></h1>
    <p>Discover premium pieces designed for your most intimate moments.</p>
    <a href="#products" class="btn-order" style="display:inline-block; width:auto; padding: 15px 40px;">Shop Collection</a>
  </div>
</section>

<section id="products">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="renderProducts('all')">All</button>
    <button class="filter-btn" onclick="renderProducts('Panties')">Panties</button>
    <button class="filter-btn" onclick="renderProducts('Sets')">Sets</button>
    <button class="filter-btn" onclick="renderProducts('Bralettes')">Bralettes</button>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</section>

<div class="modal" id="orderModal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle" style="margin-bottom:20px; font-family:'Playfair Display'">Complete Order</h2>
    <input type="text" class="modal-input" id="customerName" placeholder="Full Name">
    <input type="text" class="modal-input" id="deliveryAddress" placeholder="Delivery Address">
    <textarea class="modal-input" id="orderNotes" placeholder="Size (S, M, L, XL) or extra notes..." style="height:100px"></textarea>
    <button class="btn-order" onclick="sendToWhatsApp()">Send via WhatsApp</button>
  </div>
</section>

<script>
let currentProduct = null;

function loadSiteData() {
  const data = JSON.parse(localStorage.getItem('craveData')) || {
    brand: "Crave Me by Ashakky",
    wa: "2348100778348",
    products: [
      { id: 1, name: "Luxury Lace Set", price: "12000", cat: "Sets", img: "https://via.placeholder.com/300x400" },
      { id: 2, name: "Silk Bralette", price: "3500", cat: "Bralettes", img: "https://via.placeholder.com/300x400" }
    ]
  };
  
  document.getElementById('brandNameTop').textContent = data.brand;
  document.getElementById('navWA').href = `https://wa.me/${data.wa}`;
  return data;
}

function renderProducts(filter = 'all') {
  const data = loadSiteData();
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  
  const filtered = filter === 'all' ? data.products : data.products.filter(p => p.cat === filter);
  
  filtered.forEach(p => {
    grid.innerHTML += `
      <div class="product-card">
        <div class="product-image-wrap">
          <img src="${p.img}" class="product-img" alt="${p.name}">
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">₦${p.price}</div>
          <button class="btn-order" onclick="openModal('${p.name}', '${p.price}')">Order Now</button>
        </div>
      </div>
    `;
  });
}

function openModal(name, price) {
  currentProduct = { name, price };
  document.getElementById('modalTitle').textContent = `Order: ${name}`;
  document.getElementById('orderModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('orderModal').style.display = 'none';
}

function sendToWhatsApp() {
  const data = loadSiteData();
  const name = document.getElementById('customerName').value;
  const address = document.getElementById('deliveryAddress').value;
  const notes = document.getElementById('orderNotes').value;

  if(!name || !address) return alert("Please fill in your details.");

  const msg = `Hello! I'd like to order:\n\n*Product:* ${currentProduct.name}\n*Price:* ₦${currentProduct.price}\n*Name:* ${name}\n*Address:* ${address}\n*Notes:* ${notes}`;
  window.open(`https://wa.me/${data.wa}?text=${encodeURIComponent(msg)}`, '_blank');
}

window.onload = () => renderProducts();
</script>
</body>
</html>
