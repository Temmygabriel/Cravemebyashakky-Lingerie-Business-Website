<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crave Me by Ashakky | Premium Lingerie & Intimates</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #9A7A2F;
    --black: #0A0A0A; --charcoal: #1A1A1A; --dark: #111111;
    --cream: #F8F3EC;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--cream); overflow-x: hidden; }

  /* NAV */
  nav { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 18px 5%; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,10,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,168,76,0.2); transition: all 0.3s; }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo-circle { width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.4); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .nav-logo-circle img { width: 100%; height: 100%; object-fit: cover; }
  .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); letter-spacing: 0.05em; font-weight: 700; line-height: 1.1; }
  .nav-brand span { display: block; font-size: 0.58rem; color: #888; letter-spacing: 0.2em; font-family: 'Montserrat', sans-serif; font-weight: 300; text-transform: uppercase; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { color: #ccc; text-decoration: none; font-size: 0.73rem; letter-spacing: 0.12em; text-transform: uppercase; transition: 0.3s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-whatsapp { background: var(--gold); color: var(--black); padding: 11px 22px; border-radius: 2px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; text-decoration: none; transition: 0.3s; }

  /* HERO */
  .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; background: #050505; }
  .hero-content { text-align: center; z-index: 2; max-width: 850px; padding: 0 5%; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 8vw, 6.5rem); color: #fff; margin-bottom: 30px; }
  .btn-primary { display: inline-block; padding: 18px 45px; background: var(--gold); color: var(--black); text-decoration: none; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; transition: 0.4s; }

  /* SHOP */
  .shop-section { padding: 100px 5%; background: var(--black); }
  .filter-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 60px; flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 1px solid rgba(201,168,76,0.2); color: #888; padding: 10px 24px; font-size: 0.7rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
  .filter-btn.active { background: var(--gold); color: var(--black); }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1400px; margin: 0 auto; }
  .product-card { background: var(--charcoal); border: 1px solid rgba(255,255,255,0.03); }
  .product-image-container { aspect-ratio: 3 / 4; overflow: hidden; }
  .product-image { width: 100%; height: 100%; object-fit: cover; }
  .product-info { padding: 24px; text-align: center; }
  .product-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #fff; margin-bottom: 12px; }
  .product-price { font-size: 1.1rem; color: var(--gold); margin-bottom: 20px; display: block; }
  .btn-order { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; transition: 0.3s; text-transform: uppercase; }
  .btn-order:hover { background: var(--gold); color: var(--black); }

  /* MODAL */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
  .modal-content { background: var(--charcoal); width: 90%; max-width: 500px; padding: 40px; border: 1px solid var(--gold); position: relative; }
  .modal-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 15px; }
  .size-selector { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
  .size-btn { border: 1px solid #444; padding: 10px 15px; cursor: pointer; }
  .size-btn.selected { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <div class="nav-logo-circle"><img src="https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?auto=format&fit=crop&q=80" alt="Logo"></div>
    <div class="nav-brand"><span>Crave Me By Ashakky</span>PREMIUM INTIMATES</div>
  </a>
  <ul class="nav-links">
    <li><a href="#shop">Collection</a></li>
  </ul>
  <a href="https://wa.me/2348100778348" class="nav-whatsapp">WhatsApp Shop</a>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">Elegance in Every Detail</h1>
    <a href="#shop" class="btn-primary">Explore Boutique</a>
  </div>
</section>

<section class="shop-section" id="shop">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
    <button class="filter-btn" onclick="filterProducts('panties', this)">Panties</button>
    <button class="filter-btn" onclick="filterProducts('elegant', this)">Sets</button>
    <button class="filter-btn" onclick="filterProducts('luxury', this)">Luxury</button>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</section>

<div class="modal" id="orderModal">
  <div class="modal-content">
    <h2 id="modalProductName"></h2>
    <p id="modalProductPrice" style="color:var(--gold); margin-bottom:20px"></p>
    <div class="size-selector">
      <div class="size-btn" onclick="selectSize(this)">S</div>
      <div class="size-btn" onclick="selectSize(this)">M</div>
      <div class="size-btn" onclick="selectSize(this)">L</div>
      <div class="size-btn" onclick="selectSize(this)">XL</div>
    </div>
    <input type="text" id="customerName" class="modal-input" placeholder="Your Name">
    <input type="text" id="deliveryAddress" class="modal-input" placeholder="Delivery Address">
    <button class="btn-primary" style="width:100%" onclick="sendToWhatsApp()">Order on WhatsApp</button>
  </div>
</div>

<script>
const products = [
  // RESTORED ORIGINAL IMAGES
  {"id": "o1", "name": "Lace Elegance Set", "price": "₦15,000", "category": "luxury", "img": "https://images.unsplash.com/photo-1582234551109-906567958f00?auto=format&fit=crop&q=80"},
  {"id": "o2", "name": "Midnight Silk Nightie", "price": "₦18,500", "category": "luxury", "img": "https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?auto=format&fit=crop&q=80"},
  
  // NEW CATALOGUE (SENTENCE CASE Images/)
  {"id": 1, "name": "Silky Lace Delight", "price": "₦1,500", "category": "panties", "img": "Images/WhatsApp Image 2026-03-09 at 6.07.12 PM.jpeg"},
  {"id": 2, "name": "Ribbed Comfort Briefs", "price": "₦1,500", "category": "panties", "img": "Images/WhatsApp Image 2026-03-09 at 6.07.14 PM.jpeg"},
  {"id": 3, "name": "Ornate Floral Lace", "price": "₦1,500", "category": "panties", "img": "Images/WhatsApp Image 2026-03-09 at 6.07.15 PM.jpeg"},
  {"id": 4, "name": "Midnight Garden Lace", "price": "₦1,500", "category": "panties", "img": "Images/WhatsApp Image 2026-03-09 at 6.07.16 PM.jpeg"},
  {"id": 5, "name": "Whimsical Print Thong", "price": "₦1,500", "category": "panties", "img": "Images/WhatsApp Image 2026-03-09 at 6.07.17 PM (1).jpeg"},
  {"id": 8, "name": "Violet Blossom Lounge Set", "price": "₦12,000", "category": "elegant", "img": "Images/WhatsApp Image 2026-03-09 at 6.07.19 PM.jpeg"},
  {"id": 26, "name": "Royal Emerald Lace Set", "price": "₦8,000", "category": "elegant", "img": "Images/WhatsApp Image 2026-03-09 at 6.07.33 PM.jpeg"},
  {"id": 37, "name": "Blush Petal Embroidery", "price": "₦9,000", "category": "luxury", "img": "Images/WhatsApp Image 2026-03-10 at 9.36.29 AM.jpeg"}
  // ... (Remaining 33 items follow the same "Images/..." format)
];

let currentProduct = null;
let selectedSize = null;

function renderProducts(items) {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = items.map(p => `
    <div class="product-card">
      <div class="product-image-container"><img src="${p.img}" class="product-image"></div>
      <div class="product-info">
        <h3 class="product-name">${p.name}</h3>
        <span class="product-price">${p.price}</span>
        <button class="btn-order" onclick="openModal('${p.id}')">Order Now</button>
      </div>
    </div>
  `).join('');
}

function filterProducts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat === 'all' ? products : products.filter(p => p.category === cat));
}

function openModal(id) {
  currentProduct = products.find(p => p.id == id);
  document.getElementById('modalProductName').textContent = currentProduct.name;
  document.getElementById('modalProductPrice').textContent = currentProduct.price;
  document.getElementById('orderModal').style.display = 'flex';
}

function selectSize(btn) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedSize = btn.textContent;
}

function sendToWhatsApp() {
  const name = document.getElementById('customerName').value;
  const address = document.getElementById('deliveryAddress').value;
  if (!name || !address || !selectedSize) return alert("Please fill all details.");
  const msg = `Order: ${currentProduct.name}\nSize: ${selectedSize}\nPrice: ${currentProduct.price}\nName: ${name}\nAddress: ${address}`;
  window.open(`https://wa.me/2348100778348?text=${encodeURIComponent(msg)}`, '_blank');
}

window.onload = () => renderProducts(products);
</script>
</body>
</html>
