<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Crave Me</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --gold: #C9A84C; --black: #0A0A0A; --charcoal: #1A1A1A; }
  body { font-family: 'Montserrat', sans-serif; background: var(--black); color: #fff; margin: 0; }
  .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: var(--charcoal); padding: 40px; border: 1px solid var(--gold); width: 350px; text-align: center; }
  input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; }
  .btn { background: var(--gold); color: #000; padding: 14px; width: 100%; border: none; font-weight: 700; cursor: pointer; }
  #dashboard { display: none; padding: 50px; max-width: 800px; margin: auto; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="card">
    <h2 style="font-family:'Playfair Display'; color:var(--gold)">Admin Login</h2>
    <input type="password" id="pass" placeholder="Password">
    <button class="btn" onclick="login()">Access Dashboard</button>
  </div>
</div>

<div id="dashboard">
  <h1 style="font-family:'Playfair Display'; color:var(--gold)">Add New Product</h1>
  <div class="card" style="width:100%; text-align:left">
    <label>Product Name</label>
    <input type="text" id="pName" placeholder="e.g. Silk Lace Thong">
    
    <label>Price</label>
    <input type="text" id="pPrice" placeholder="e.g. ₦1,500">
    
    <label>Category</label>
    <select id="pCat">
      <option value="panties">Panties</option>
      <option value="elegant">Sets</option>
      <option value="luxury">Luxury</option>
    </select>
    
    <label>Image Filename (Upload to 'Images' folder first)</label>
    <input type="text" id="pImg" placeholder="e.g. product-image.jpg">
    
    <button class="btn" onclick="generateCode()">Generate Code Entry</button>
    
    <p style="margin-top:20px; font-size:0.8rem; color:#888">
      Copy the line below and paste it into the 'products' array in your index.html file:
    </p>
    <code id="output" style="display:block; background:#000; padding:15px; border:1px dashed var(--gold); word-break:break-all"></code>
  </div>
</div>

<script>
function login() {
  if(document.getElementById('pass').value === 'ashakky123') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } else { alert("Wrong password"); }
}

function generateCode() {
  const name = document.getElementById('pName').value;
  const price = document.getElementById('pPrice').value;
  const cat = document.getElementById('pCat').value;
  const img = document.getElementById('pImg').value;
  
  const code = `{"id": Date.now(), "name": "${name}", "price": "${price}", "category": "${cat}", "img": "Images/${img}"},`;
  document.getElementById('output').textContent = code;
}
</script>
</body>
</html>
