<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Crave Me by Ashakky</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9A84C; --gold-light: #E8C97A;
  --black: #0A0A0A; --charcoal: #1A1A1A;
  --cream: #F8F3EC; --red: #e74c3c; --green: #2ecc71;
}
body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--cream); min-height: 100vh; }

/* LOGIN */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: var(--charcoal); border: 1px solid rgba(201,168,76,0.25); border-radius: 8px; padding: 40px; max-width: 400px; width: 100%; text-align: center; }
.login-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 30px; }
.login-input { width: 100%; padding: 12px; background: var(--black); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #fff; font-size: 0.95rem; margin-bottom: 15px; }
.login-input:focus { outline: none; border-color: var(--gold); }
.login-btn { width: 100%; padding: 14px; background: var(--gold); color: var(--black); border: none; border-radius: 4px; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
.login-btn:hover { background: var(--gold-light); }
.login-error { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }

/* ADMIN */
.admin-screen { display: none; }
.admin-header { background: var(--charcoal); border-bottom: 1px solid rgba(201,168,76,0.2); padding: 20px 5%; display: flex; align-items: center; justify-content: space-between; }
.admin-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.4rem; }
.btn-logout { background: transparent; color: #888; padding: 10px 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; }
.btn-logout:hover { color: var(--red); border-color: var(--red); }

.admin-content { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
.stat-card { background: var(--charcoal); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; padding: 20px; text-align: center; }
.stat-number { font-size: 2rem; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 5px; }

.section-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 20px; }
.btn-add { background: var(--green); color: #fff; padding: 12px 24px; border: none; border-radius: 4px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
.btn-add:hover { background: #27ae60; }

.products-table { background: var(--charcoal); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; overflow: hidden; }
.table-header { display: grid; grid-template-columns: 60px 80px 2fr 1fr 1fr 120px; gap: 15px; padding: 15px 20px; background: rgba(201,168,76,0.1); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; }
.table-row { display: grid; grid-template-columns: 60px 80px 2fr 1fr 1fr 120px; gap: 15px; padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.05); align-items: center; }
.table-row:hover { background: rgba(201,168,76,0.05); }
.product-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
.product-id { color: #666; font-size: 0.85rem; }
.product-name { color: #fff; font-weight: 500; }
.product-category { color: var(--gold); font-size: 0.85rem; text-transform: capitalize; }
.product-price { color: var(--gold); font-weight: 600; }
.table-actions { display: flex; gap: 8px; }
.btn-edit { padding: 6px 12px; background: transparent; border: 1px solid var(--gold); color: var(--gold); border-radius: 3px; cursor: pointer; font-size: 0.75rem; }
.btn-edit:hover { background: rgba(201,168,76,0.1); }
.btn-delete { padding: 6px 12px; background: transparent; border: 1px solid var(--red); color: var(--red); border-radius: 3px; cursor: pointer; font-size: 0.75rem; }
.btn-delete:hover { background: rgba(231,76,60,0.1); }

/* MODAL */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
.modal.active { display: flex; }
.modal-content { background: var(--charcoal); border-radius: 8px; max-width: 600px; width: 100%; padding: 30px; margin: 20px 0; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
.modal-close { background: none; border: none; color: #888; font-size: 1.8rem; cursor: pointer; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 0.85rem; color: #999; margin-bottom: 8px; letter-spacing: 0.1em; text-transform: uppercase; }
.form-input { width: 100%; padding: 12px; background: var(--black); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #fff; font-size: 0.95rem; }
.form-input:focus { outline: none; border-color: var(--gold); }
.form-select { width: 100%; padding: 12px; background: var(--black); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #fff; font-size: 0.95rem; }
.btn-save { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: 4px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
.btn-save:hover { background: #27ae60; }

.empty-state { text-align: center; padding: 60px 20px; color: #666; }
.loading { text-align: center; padding: 60px 20px; color: #888; }

@media (max-width: 768px) {
  .table-header, .table-row { grid-template-columns: 1fr; gap: 10px; }
  .table-header { display: none; }
  .table-actions { justify-content: flex-start; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1 class="login-title">Admin Login</h1>
    <input type="email" class="login-input" id="loginEmail" placeholder="Email">
    <input type="password" class="login-input" id="loginPassword" placeholder="Password">
    <button class="login-btn" onclick="login()">Login</button>
    <div class="login-error" id="loginError">Invalid credentials</div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div class="admin-screen" id="adminScreen">
  <div class="admin-header">
    <h1 class="admin-title">Crave Me Admin Panel</h1>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>

  <div class="admin-content">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="totalProducts">0</div>
        <div class="stat-label">Total Products</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalCategories">4</div>
        <div class="stat-label">Categories</div>
      </div>
    </div>

    <h2 class="section-title">Manage Products</h2>
    <button class="btn-add" onclick="openAddModal()">+ Add New Product</button>

    <div class="products-table">
      <div class="table-header">
        <div>ID</div>
        <div>Image</div>
        <div>Name</div>
        <div>Category</div>
        <div>Price</div>
        <div>Actions</div>
      </div>
      <div id="productsTableBody" class="loading">Loading products...</div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Add Product</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <form id="productForm">
      <div class="form-group">
        <label class="form-label">Product ID (Number)</label>
        <input type="number" class="form-input" id="productId" required>
      </div>
      <div class="form-group">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-input" id="productName" required>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="productCategory" required>
          <option value="panties">Panties & Intimates</option>
          <option value="sleepwear">Sleepwear & Loungewear</option>
          <option value="lingerie">Luxury Lingerie</option>
          <option value="mens">Men's Collection</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Price (with ₦ symbol)</label>
        <input type="text" class="form-input" id="productPrice" placeholder="₦1,500" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="productDescription" required>
      </div>
      <div class="form-group">
        <label class="form-label">Image URL</label>
        <input type="url" class="form-input" id="productImg" required placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">Available Sizes (comma separated)</label>
        <input type="text" class="form-input" id="productSizes" placeholder="S, M, L, XL" value="S, M, L, XL">
      </div>
      <button type="submit" class="btn-save">Save Product</button>
    </form>
  </div>
</div>

<script>
// 🔥 SUPABASE CONFIG
const SUPABASE_URL = 'https://siguwlaudsssmcjxwong.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_OWShfzcHQhYWW7cHxE0h2Q_hzZ9jLz9';

// Initialize Supabase
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let editingProductId = null;
let allProducts = [];

// Simple auth (in production, use proper authentication)
function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  
  if (email === 'admin@craveme.com' && password === 'admin123') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadProducts();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout() {
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
}

// Load products
async function loadProducts() {
  try {
    const { data, error } = await supabaseClient
      .from('products')
      .select('*')
      .order('id', { ascending: true });
    
    if (error) throw error;
    
    allProducts = data || [];
    renderProducts();
    updateStats();
  } catch (error) {
    console.error('Error loading products:', error);
    document.getElementById('productsTableBody').innerHTML = '<div class="empty-state">Error loading products</div>';
  }
}

function renderProducts() {
  const tbody = document.getElementById('productsTableBody');
  
  if (allProducts.length === 0) {
    tbody.innerHTML = '<div class="empty-state">No products yet. Click "Add New Product" to get started!</div>';
    return;
  }
  
  tbody.innerHTML = allProducts.map(p => `
    <div class="table-row">
      <div class="product-id">#${p.id}</div>
      <div><img src="${p.img}" class="product-thumb" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22%3E%3Crect fill=%22%231A1A1A%22 width=%2260%22 height=%2260%22/%3E%3C/svg%3E'"></div>
      <div><div class="product-name">${p.name}</div></div>
      <div class="product-category">${p.category}</div>
      <div class="product-price">${p.price}</div>
      <div class="table-actions">
        <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
        <button class="btn-delete" onclick="deleteProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('totalProducts').textContent = allProducts.length;
}

// Modal functions
function openAddModal() {
  editingProductId = null;
  document.getElementById('modalTitle').textContent = 'Add New Product';
  document.getElementById('productForm').reset();
  document.getElementById('productModal').classList.add('active');
}

function editProduct(productId) {
  const product = allProducts.find(p => p.id === productId);
  if (!product) return;
  
  editingProductId = productId;
  document.getElementById('modalTitle').textContent = 'Edit Product';
  document.getElementById('productId').value = product.id;
  document.getElementById('productName').value = product.name;
  document.getElementById('productCategory').value = product.category;
  document.getElementById('productPrice').value = product.price;
  document.getElementById('productDescription').value = product.description;
  document.getElementById('productImg').value = product.img;
  document.getElementById('productSizes').value = (product.sizes || ['S','M','L','XL']).join(', ');
  document.getElementById('productModal').classList.add('active');
}

function closeModal() {
  document.getElementById('productModal').classList.remove('active');
  document.getElementById('productForm').reset();
  editingProductId = null;
}

// Save product
document.getElementById('productForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const productData = {
    id: parseInt(document.getElementById('productId').value),
    name: document.getElementById('productName').value,
    category: document.getElementById('productCategory').value,
    price: document.getElementById('productPrice').value,
    description: document.getElementById('productDescription').value,
    img: document.getElementById('productImg').value,
    sizes: document.getElementById('productSizes').value.split(',').map(s => s.trim())
  };
  
  try {
    if (editingProductId) {
      // Update existing product
      const { error } = await supabaseClient
        .from('products')
        .update(productData)
        .eq('id', editingProductId);
      
      if (error) throw error;
      alert('Product updated successfully!');
    } else {
      // Add new product
      const { error } = await supabaseClient
        .from('products')
        .insert([productData]);
      
      if (error) throw error;
      alert('Product added successfully!');
    }
    closeModal();
    loadProducts();
  } catch (error) {
    console.error('Error saving product:', error);
    alert('Error saving product: ' + error.message);
  }
});

// Delete product
async function deleteProduct(productId, name) {
  if (!confirm(`Are you sure you want to delete "${name}"?`)) return;
  
  try {
    const { error } = await supabaseClient
      .from('products')
      .delete()
      .eq('id', productId);
    
    if (error) throw error;
    alert('Product deleted successfully!');
    loadProducts();
  } catch (error) {
    console.error('Error deleting product:', error);
    alert('Error deleting product: ' + error.message);
  }
}
</script>

</body>
</html>
