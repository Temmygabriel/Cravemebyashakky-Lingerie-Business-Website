<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Crave Me</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --gold: #C9A84C; --black: #0A0A0A; --charcoal: #1A1A1A; --cream: #F8F3EC; }
  body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--cream); padding: 50px 5%; }
  .admin-box { background: var(--charcoal); padding: 40px; border-radius: 8px; border: 1px solid var(--gold); max-width: 900px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display'; color: var(--gold); margin-bottom: 30px; }
  .input-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #888; }
  input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; }
  .btn-save { background: var(--gold); color: #000; padding: 15px 30px; border: none; font-weight: 700; cursor: pointer; margin-top: 20px; }
  .product-item { border-bottom: 1px solid #333; padding: 20px 0; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
  .btn-delete { color: #e74c3c; cursor: pointer; background: none; border: none; }
</style>
</head>
<body>

<div class="admin-box">
  <h1>Website Admin Panel</h1>
  
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;">
    <div class="input-group">
      <label>Brand Name</label>
      <input type="text" id="brandName" placeholder="Crave Me by Ashakky">
    </div>
    <div class="input-group">
      <label>WhatsApp Number (With Country Code)</label>
      <input type="text" id="waNumber" placeholder="2348100778348">
    </div>
  </div>

  <h3>Product Catalog</h3>
  <div id="adminProductList"></div>
  <button class="btn-save" style="background:#444; color:#fff" onclick="addNewProductRow()">+ Add New Product</button>
  
  <div style="text-align:right">
    <button class="btn-save" onclick="saveAllData()">Save Changes</button>
  </div>
</div>

<script>
function loadData() {
  const data = JSON.parse(localStorage.getItem('craveData')) || {
    brand: "Crave Me by Ashakky",
    wa: "2348100778348",
    products: []
  };
  document.getElementById('brandName').value = data.brand;
  document.getElementById('waNumber').value = data.wa;
  
  const list = document.getElementById('adminProductList');
  list.innerHTML = '';
  data.products.forEach((p, index) => addNewProductRow(p));
}

function addNewProductRow(p = { name: '', price: '', cat: 'Panties', img: '' }) {
  const div = document.createElement('div');
  div.className = 'product-item';
  div.innerHTML = `
    <input type="text" class="p-name" placeholder="Name" value="${p.name}">
    <input type="text" class="p-price" placeholder="Price" value="${p.price}">
    <select class="p-cat">
      <option value="Panties" ${p.cat==='Panties'?'selected':''}>Panties</option>
      <option value="Sets" ${p.cat==='Sets'?'selected':''}>Sets</option>
      <option value="Bralettes" ${p.cat==='Bralettes'?'selected':''}>Bralettes</option>
    </select>
    <button class="btn-delete" onclick="this.parentElement.remove()">Delete</button>
  `;
  document.getElementById('adminProductList').appendChild(div);
}

function saveAllData() {
  const products = [];
  document.querySelectorAll('.product-item').forEach(item => {
    products.push({
      name: item.querySelector('.p-name').value,
      price: item.querySelector('.p-price').value,
      cat: item.querySelector('.p-cat').value,
      img: "https://via.placeholder.com/300x400" // You can add image upload logic later
    });
  });

  const data = {
    brand: document.getElementById('brandName').value,
    wa: document.getElementById('waNumber').value,
    products: products
  };

  localStorage.setItem('craveData', JSON.stringify(data));
  alert("Settings Saved! Refresh your shop page to see changes.");
}

window.onload = loadData;
</script>
</body>
</html>
